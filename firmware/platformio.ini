; =============================================================================
; code_mate 固件 — Waveshare ESP32-S3-LCD-1.47 (ESP32-S3R8, 16MB Flash / 8MB PSRAM)
; PlatformIO + Arduino framework + TFT_eSPI。引脚见 include/board_config.h。
;
; 两套构建(公共配置在 [env],各 env 只在 USB 模式 + 分区 + CM_USB_DISK 上分叉):
;   - _debug   = HWCDC,自动快速烧录,日常迭代(host dtr=False)。
;   - _release = TinyUSB-OTG + 只读 U 盘(MSC)+ NVS 模式切换,出厂用(host dtr=True;
;                烧录 esptool 自动复位失败 → 手动 BOOT+RST,详见 README.md)。
; =============================================================================
[platformio]
; 核心缓存(平台/工具链/库)放项目内,隔离全局 ~/.platformio,不影响其他工程。
core_dir = .platformio
default_envs = waveshare_s3_lcd_147_debug   ; `pio run` 默认 debug(可自动烧录)

; ===================== 公共配置(两套 env 共享)=====================
[env]
; --- 平台:经 pioarduino 提供较新的 arduino-esp32(主线 PlatformIO 平台落后)---
;   55.03.39 = arduino-esp32 3.3.9 + ESP-IDF 5.5.4(最接近文档 §6 钉的 3.3.10)。
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino

; --- 板级:16MB Flash + 8MB Octal PSRAM(ESP32-S3R8)---
board_build.flash_size = 16MB
board_build.arduino.memory_type = qio_opi   ; Flash QIO + PSRAM OPI(八线)
board_upload.flash_size = 16MB

monitor_speed = 115200
upload_speed = 921600

lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    lvgl/lvgl @ ^9.5.0
    bblanchon/ArduinoJson @ ^7.2.0
    adafruit/Adafruit NeoPixel @ ^1.12.0   ; LED 灯效(板载单颗 + 可选外接灯环,GPIO38)

build_flags =
    ; ---- USB CDC:Serial 走 USB CDC(CLAUDE.md §9 红线)。USB 栈(HWCDC vs TinyUSB)由各 env 的
    ;      ARDUINO_USB_MODE 决定;若插上能枚举串口但收不到数据,优先怀疑 USB 模式宏。----
    -D ARDUINO_USB_CDC_ON_BOOT=1
    ; ---- PSRAM ----
    -D BOARD_HAS_PSRAM
    ; ---- TFT_eSPI 配置走 build_flags,不改库源码(TFT_eSPI #3527 + CLAUDE.md §2)----
    -D USER_SETUP_LOADED=1
    -D ST7789_DRIVER=1
    -D TFT_RGB_ORDER=TFT_BGR
    -D TFT_WIDTH=172          ; TFT_eSPI 据此自动套用 172 宽的列/行偏移(34)
    -D TFT_HEIGHT=320
    -D TFT_MOSI=45
    -D TFT_SCLK=40
    -D TFT_CS=42
    -D TFT_DC=41
    -D TFT_RST=39
    -D TFT_BL=48
    ; ⚠️ 不定义 TFT_BACKLIGHT_ON:否则 TFT_eSPI init 会自行拉亮背光,在 DISPON 显示面板上电白 GRAM
    ;    时露出 → 开机白闪。背光极性该板 active-high,全程由 main.cpp 手控(关到画好首屏才开)。
    -D SPI_FREQUENCY=27000000 ; 整屏过场需更快刷新(8→27MHz);若黑屏回退 8M
    -D USE_HSPI_PORT          ; ⚠️ 关键:该板不加这条会黑屏(#3527 结论)
    ; ---- 字体 ----
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_GFXFF=1
    -D SMOOTH_FONT=1
    ; ---- LVGL v9.5(lv_conf.h 在 include/,走 LV_CONF_INCLUDE_SIMPLE)----
    -I include
    -D LV_CONF_INCLUDE_SIMPLE
    -D LV_LVGL_H_INCLUDE_SIMPLE   ; lv_font_conv 生成的字体 .c 据此用 "lvgl.h"

; ===================== debug:HWCDC,自动烧录,日常迭代 =====================
[env:waveshare_s3_lcd_147_debug]
board_build.partitions = default_16MB.csv
build_flags =
    ${env.build_flags}
    -D ARDUINO_USB_MODE=1     ; HWCDC(硬件 USB-Serial-JTAG);host 用 dtr=False

; ===================== release:OTG + 只读 U 盘(MSC),出厂用 =====================
;   ⚠️ ARDUINO_USB_MODE=0 下 esptool 自动复位失败 → 烧录手动 BOOT+RST(或运行中 {"t":"dfu"})。
[env:waveshare_s3_lcd_147_release]
board_build.partitions = partitions_release.csv
board_build.filesystem = fatfs       ; U 盘内容(firmware/data/)做成 FAT 镜像 → buildfs/uploadfs 烧入 storage 分区
build_flags =
    ${env.build_flags}
    -D ARDUINO_USB_MODE=0     ; TinyUSB-OTG(支持 MSC 只读 U 盘);host 升 dtr=True 才连
    -D CM_USB_DISK            ; 启用 U 盘 / MSC / NVS 模式切换代码(全部 #ifdef 此宏)
